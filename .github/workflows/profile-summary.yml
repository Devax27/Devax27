name: GitHub Summary Cards

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # ✅ THIS STEP IS MISSING IN YOUR FILE
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate cards
        uses: vn7n24fzkq/github-profile-summary-cards@release
        with:
          USERNAME: Devax27
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
